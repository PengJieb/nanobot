<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nanobot App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Chart.js for chart components -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: {} } }
    </script>
    <style>
        /* 12-column grid layout */
        .app-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 1rem;
            align-items: start;
        }
        .app-cell { min-width: 0; }

        /* Component base styles */
        .app-label {
            font-size: 0.8125rem;
            font-weight: 500;
            color: #9ca3af;
            margin-bottom: 0.3rem;
        }
        .app-input {
            width: 100%;
            background: #374151;
            color: #f3f4f6;
            border: 1px solid #4b5563;
            border-radius: 0.5rem;
            padding: 0.5rem 0.75rem;
            font-size: 0.9375rem;
            outline: none;
            transition: border-color 0.15s;
        }
        .app-input:focus { border-color: #3b82f6; }
        .app-input:disabled { opacity: 0.5; }

        .app-textarea {
            width: 100%;
            background: #374151;
            color: #f3f4f6;
            border: 1px solid #4b5563;
            border-radius: 0.5rem;
            padding: 0.5rem 0.75rem;
            font-size: 0.9375rem;
            outline: none;
            resize: vertical;
            transition: border-color 0.15s;
        }
        .app-textarea:focus { border-color: #3b82f6; }

        .app-select {
            width: 100%;
            background: #374151;
            color: #f3f4f6;
            border: 1px solid #4b5563;
            border-radius: 0.5rem;
            padding: 0.5rem 0.75rem;
            font-size: 0.9375rem;
            outline: none;
            cursor: pointer;
        }
        .app-select:focus { border-color: #3b82f6; }

        .app-btn {
            border-radius: 0.5rem;
            font-weight: 500;
            font-size: 0.9375rem;
            padding: 0.5rem 1.25rem;
            cursor: pointer;
            transition: all 0.15s;
            border: none;
        }
        .app-btn.primary  { background: #2563eb; color: white; }
        .app-btn.primary:hover  { background: #1d4ed8; }
        .app-btn.secondary { background: #374151; color: #f3f4f6; border: 1px solid #4b5563; }
        .app-btn.secondary:hover { background: #4b5563; }
        .app-btn.danger   { background: #dc2626; color: white; }
        .app-btn.danger:hover   { background: #b91c1c; }
        .app-btn:disabled { opacity: 0.45; cursor: not-allowed; }

        .app-card {
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 0.75rem;
            padding: 1.25rem;
        }

        .app-table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
        .app-table th { background: rgba(255,255,255,0.05); font-weight: 600; text-align: left;
                        padding: 0.6rem 0.75rem; border-bottom: 1px solid #374151; color: #d1d5db; }
        .app-table td { padding: 0.55rem 0.75rem; border-bottom: 1px solid #1f2937; color: #e5e7eb; }
        .app-table tr:last-child td { border-bottom: none; }
        .app-table tr:hover td { background: rgba(255,255,255,0.03); }

        .app-divider { border: none; border-top: 1px solid #374151; margin: 0.5rem 0; }

        .app-slider { width: 100%; accent-color: #3b82f6; cursor: pointer; }
        .slider-value { font-size: 0.875rem; color: #9ca3af; margin-left: 0.5rem; }

        .app-result-box {
            background: #111827;
            border: 1px solid #374151;
            border-radius: 0.5rem;
            padding: 0.75rem 1rem;
            min-height: 3rem;
            font-size: 0.9375rem;
            color: #d1d5db;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .app-result-box.loading { color: #6b7280; font-style: italic; }

        /* Typing indicator inside results */
        .app-typing { display: flex; align-items: center; gap: 0.5rem; color: #6b7280; font-style: italic; }
        .app-typing-dots span { animation: blink 1.4s infinite both; }
        .app-typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .app-typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    </style>
</head>
<body class="h-full bg-gray-900 text-gray-100 flex flex-col dark">
    <!-- Nav -->
    <nav class="bg-gray-800 border-b border-gray-700 px-6 py-3 flex items-center justify-between shrink-0">
        <div class="flex items-center gap-4">
            <span class="text-xl font-bold tracking-tight">🤖 nanobot</span>
            <a href="/" class="text-gray-400 hover:text-gray-200">Chat</a>
            <a href="/skills.html" class="text-gray-400 hover:text-gray-200">Skills</a>
            <a href="/apps.html" class="text-blue-400 font-medium hover:underline">Apps</a>
        </div>
        <div class="flex items-center gap-3">
            <a href="/apps.html"
               class="text-sm text-gray-400 hover:text-gray-200 px-2 py-1.5 transition flex items-center gap-1">
                <i class="fa-solid fa-arrow-left text-xs"></i> Back to Apps
            </a>
            <button id="logout-btn" class="text-sm text-gray-400 hover:text-gray-200 px-2 py-1.5 transition">
                Logout
            </button>
        </div>
    </nav>

    <!-- App title bar -->
    <div id="app-titlebar" class="hidden bg-gray-800/50 border-b border-gray-700/50 px-8 py-3 flex items-center gap-3">
        <span id="app-title" class="font-semibold text-lg"></span>
        <span id="app-desc" class="text-gray-400 text-sm"></span>
    </div>

    <!-- Loading / error states -->
    <div id="loading-state" class="flex-1 flex items-center justify-center">
        <div class="text-center text-gray-400">
            <i class="fa-solid fa-spinner fa-spin text-2xl mb-3"></i>
            <p>Loading app...</p>
        </div>
    </div>
    <div id="error-state" class="hidden flex-1 flex items-center justify-center">
        <div class="text-center text-red-400">
            <i class="fa-solid fa-circle-exclamation text-2xl mb-3"></i>
            <p id="error-msg">App not found.</p>
        </div>
    </div>

    <!-- App canvas -->
    <div id="app-canvas" class="hidden flex-1 overflow-y-auto p-8">
        <div id="app-root" class="max-w-5xl mx-auto app-grid"></div>

        <!-- Feedback section -->
        <div class="max-w-5xl mx-auto mt-8 pt-6 border-t border-gray-700">
            <h3 class="text-sm font-semibold text-gray-300 mb-3">Improve this app</h3>
            <div class="flex gap-3">
                <input id="feedback-input" type="text" placeholder="Describe what you'd like to change or improve..."
                    class="flex-1 bg-gray-700 text-gray-100 rounded-lg px-4 py-2.5 outline-none focus:ring-2 focus:ring-blue-500 placeholder-gray-400">
                <button id="feedback-btn" class="bg-blue-600 hover:bg-blue-500 text-white px-5 py-2.5 rounded-lg font-medium transition disabled:opacity-40">
                    Regenerate
                </button>
            </div>
            <p class="text-xs text-gray-500 mt-2">The AI will update the app based on your feedback</p>
        </div>
    </div>

    <script src="/app_viewer.js"></script>
</body>
</html>
