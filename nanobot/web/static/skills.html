<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nanobot - Skills</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: {} }
        }
    </script>
</head>
<body class="h-full bg-gray-900 text-gray-100 flex flex-col dark">
    <!-- Nav -->
    <nav class="bg-gray-800 border-b border-gray-700 px-6 py-3 flex items-center justify-between shrink-0">
        <div class="flex items-center gap-4">
            <span class="text-xl font-bold tracking-tight">🤖 nanobot</span>
            <a href="/" class="text-gray-400 hover:text-gray-200">Chat</a>
            <a href="/skills.html" class="text-blue-400 font-medium hover:underline">Skills</a>
        </div>
        <button id="logout-btn" class="text-sm text-gray-400 hover:text-gray-200 px-2 py-1.5 transition">
            Logout
        </button>
    </nav>

    <div id="split-container" class="flex-1 flex overflow-hidden">
        <!-- Left: skill list -->
        <div id="left-panel" class="flex flex-col overflow-hidden" style="width:35%;min-width:200px">
            <div class="p-4 border-b border-gray-700">
                <input id="search" type="text" placeholder="Search skills..."
                    class="w-full bg-gray-700 text-gray-100 rounded-lg px-4 py-2 outline-none focus:ring-2 focus:ring-blue-500 placeholder-gray-400">
            </div>
            <div id="skills-grid" class="flex-1 overflow-y-auto p-4 space-y-3"></div>
        </div>

        <!-- Drag handle -->
        <div id="drag-handle" class="split-handle"></div>

        <!-- Right: skill detail (always visible) -->
        <div id="right-panel" class="flex-1 flex flex-col overflow-hidden" style="min-width:300px">
            <div id="detail-header" class="p-6 border-b border-gray-700">
                <h2 id="detail-name" class="text-2xl font-bold"></h2>
                <p id="detail-desc" class="text-gray-400 mt-1"></p>
                <div id="detail-badges" class="flex gap-2 mt-3"></div>
            </div>
            <div id="detail-content" class="flex-1 overflow-y-auto p-6 max-w-none">
                <div class="flex items-center justify-center h-full text-gray-500">
                    <div class="text-center">
                        <i class="fa-solid fa-arrow-left text-3xl mb-3 block opacity-40"></i>
                        Select a skill to view details
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/skills.js"></script>
</body>
</html>
