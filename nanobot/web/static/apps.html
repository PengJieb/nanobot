<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nanobot - Apps</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: {} } }
    </script>
</head>
<body class="h-full bg-gray-900 text-gray-100 flex flex-col dark">
    <!-- Nav -->
    <nav class="bg-gray-800 border-b border-gray-700 px-6 py-3 flex items-center justify-between shrink-0">
        <div class="flex items-center gap-4">
            <span class="text-xl font-bold tracking-tight">🤖 nanobot</span>
            <a href="/" class="text-gray-400 hover:text-gray-200">Chat</a>
            <a href="/skills.html" class="text-gray-400 hover:text-gray-200">Skills</a>
            <a href="/apps.html" class="text-blue-400 font-medium hover:underline">Apps</a>
        </div>
        <div class="flex items-center gap-3">
            <a href="/app_builder.html"
               class="text-sm bg-blue-600 hover:bg-blue-500 text-white px-4 py-1.5 rounded-md transition font-medium">
                + New App
            </a>
            <button id="logout-btn" class="text-sm text-gray-400 hover:text-gray-200 px-2 py-1.5 transition">
                Logout
            </button>
        </div>
    </nav>

    <div class="flex-1 overflow-y-auto p-8">
        <div class="max-w-5xl mx-auto">
            <h1 class="text-2xl font-bold mb-2">Your Applications</h1>
            <p class="text-gray-400 mb-8">
                Apps generated by the AI. Type <code class="bg-gray-700 px-1.5 py-0.5 rounded text-sm">#app</code>
                in Chat to create a new one.
            </p>

            <!-- Loading -->
            <div id="loading" class="text-gray-400 text-center py-16">
                <i class="fa-solid fa-spinner fa-spin text-2xl mb-3"></i>
                <p>Loading apps...</p>
            </div>

            <!-- Empty state -->
            <div id="empty" class="hidden text-center py-24">
                <i class="fa-solid fa-cubes text-5xl text-gray-600 mb-4"></i>
                <p class="text-xl text-gray-400 mb-2">No apps yet</p>
                <p class="text-gray-500 mb-6">Create your first app to get started.</p>
                <a href="/app_builder.html"
                   class="inline-block bg-blue-600 hover:bg-blue-500 text-white px-6 py-2.5 rounded-lg font-medium transition">
                    Build an App
                </a>
            </div>

            <!-- App grid -->
            <div id="app-grid" class="hidden grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5"></div>
        </div>
    </div>

    <script src="/apps.js"></script>
</body>
</html>
